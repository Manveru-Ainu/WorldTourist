<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Tourist — Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Libre+Franklin:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3e9d2;--paper-2:#efe2c4;--ink:#1f2a44;--ink-soft:#42506e;
    --red:#b23a2e;--gold:#c08a2d;--line:#cdbd97;
    --g-cafe:#8a5a3b;--g-celeste:#6fb8d6;--g-rosa:#cf6f9e;--g-naranja:#e08a2e;
    --g-rojo:#cc3b35;--g-amarillo:#e9c531;--g-verde:#3f9d5f;--g-azul:#2f4a8c;--g-aerea:#2b2b2b;--g-serv:#5c6b7a;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:"Libre Franklin",system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(120% 120% at 10% 0%, #f7efda 0%, var(--paper) 45%, var(--paper-2) 100%);min-height:100vh;padding:16px 12px 40px}
  .wrap{max-width:1080px;margin:0 auto}
  h1.title{font-family:"Playfair Display",serif;font-weight:800;text-align:center;font-size:clamp(22px,4vw,36px);margin:2px 0 4px}
  .roomline{text-align:center;font-family:"Space Mono",monospace;font-size:12px;color:var(--red);margin-bottom:10px;min-height:16px}

  .board{position:relative;width:min(94vw,720px);height:min(94vw,720px);margin:0 auto;display:grid;
    grid-template-columns:1.55fr repeat(9,1fr) 1.55fr;grid-template-rows:1.55fr repeat(9,1fr) 1.55fr;gap:3px;padding:3px;
    background:repeating-linear-gradient(45deg,#1f2a44 0 12px,#f3e9d2 12px 24px,#b23a2e 24px 36px,#f3e9d2 36px 48px);
    border-radius:8px;box-shadow:0 16px 44px rgba(31,42,68,.28)}
  .board-inner-bg{position:absolute;inset:16px;background:var(--paper);border:1.5px solid var(--line);border-radius:4px;z-index:0}
  .cell{position:relative;z-index:1;background:#fbf5e6;border:1px solid #d9caa3;border-radius:3px;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0;cursor:pointer;transition:box-shadow .12s}
  .cell:hover{box-shadow:0 0 0 2px var(--gold) inset}
  .cell.owned{box-shadow:0 0 0 3px var(--own) inset}
  .band{height:20%;min-height:11px;width:100%;border-bottom:1px solid rgba(0,0,0,.18)}
  .cell-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:3px 3px 2px;min-height:0}
  .cell .name{font-weight:700;font-size:9px;line-height:1.05;text-transform:uppercase;color:var(--ink)}
  .cell .price{font-family:"Space Mono",monospace;font-weight:700;font-size:8.5px;color:var(--ink)}
  .cell .icon{font-size:15px;line-height:1}
  .cell .sub{font-size:7.5px;color:#8a7c54;text-transform:uppercase;letter-spacing:.05em}
  .cell .ctr{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px}
  .corner{align-items:center;justify-content:center;text-align:center;padding:4px;background:#f6edd6}
  .corner .icon{font-size:clamp(16px,2.6vw,26px)}
  .corner .ctitle{font-family:"Playfair Display",serif;font-weight:800;font-size:clamp(8px,1.2vw,12px);line-height:1.02;margin-top:2px;text-transform:uppercase}
  .corner .csub{font-family:"Space Mono",monospace;font-size:7.5px;color:#7a6a44;margin-top:1px}

  .tok-layer{position:absolute;inset:0;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1px;pointer-events:none;z-index:5;padding:1px}
  .token{width:clamp(13px,2.1vw,19px);height:clamp(13px,2.1vw,19px);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:clamp(8px,1.4vw,11px);border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.5);animation:blink .9s ease-in-out infinite}
  .token.active{animation:blinkActive .6s ease-in-out infinite;z-index:7}
  @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.78)}}
  @keyframes blinkActive{0%,100%{opacity:1;transform:scale(1.18);box-shadow:0 0 0 3px var(--gold),0 0 10px var(--gold)}50%{opacity:.55;transform:scale(.9);box-shadow:0 0 0 2px rgba(192,138,45,.4)}}

  .center{grid-column:2 / 11;grid-row:2 / 11;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:9px;padding:12px}
  .center .brand{font-family:"Space Mono",monospace;letter-spacing:.3em;font-size:10px;color:var(--red);text-transform:uppercase}
  .turn-badge{display:flex;align-items:center;gap:8px;font-family:"Playfair Display",serif;font-weight:800;font-size:clamp(14px,2.5vw,22px)}
  .turn-plane{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3)}
  .money{font-family:"Space Mono",monospace;font-weight:700;font-size:clamp(13px,2vw,16px);color:#2f6b3f}
  .dice{display:flex;gap:10px}
  .die{width:clamp(32px,5.5vw,46px);height:clamp(32px,5.5vw,46px);background:#fff;border:2px solid var(--ink);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;font-weight:700;font-size:clamp(17px,3vw,26px);box-shadow:0 3px 0 rgba(31,42,68,.25)}
  .die.rolling{animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-12deg)}75%{transform:translateY(-5px) rotate(12deg)}}
  #action{min-height:46px;display:flex;align-items:center;justify-content:center}
  .roll-btn{font-family:"Space Mono",monospace;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:14px;padding:11px 26px;border:0;border-radius:8px;background:var(--ink);color:#fff;cursor:pointer;box-shadow:0 4px 0 rgba(31,42,68,.35)}
  .roll-btn:hover{background:var(--red)}
  .waiting{font-size:12.5px;color:#6f6238;font-style:italic}

  #qbanner{max-width:720px;margin:10px auto 0;background:#fff;border:1.5px dashed var(--gold);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--ink);display:none}
  #qbanner b{color:var(--red);font-family:"Space Mono",monospace;font-size:11px}

  .hud{max-width:720px;margin:14px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:620px){.hud{grid-template-columns:1fr}}
  .panel{background:#fbf5e6;border:1px solid #d9caa3;border-radius:10px;padding:12px 14px}
  .panel h3{margin:0 0 8px;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--red)}
  .pcard{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .pcard:last-child{border-bottom:0}
  .pdisc{width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .pcard.turn{background:rgba(192,138,45,.14);border-radius:6px;padding-left:6px}
  .pcard.dead{opacity:.45;filter:grayscale(1)}
  .pcard .pn{font-weight:700;font-size:13px;flex:1;min-width:0}
  .pcard .tagk{font-family:"Space Mono",monospace;font-size:9px;color:#7a6a44;text-transform:uppercase}
  .pcard .pm{font-family:"Space Mono",monospace;font-weight:700;font-size:13px;color:#2f6b3f}
  .pcard .pp{font-family:"Space Mono",monospace;font-size:10px;color:#7a6a44}
  .log{height:150px;overflow:auto;font-size:12px;line-height:1.5;color:#43506b}
  .log div{padding:2px 0;border-bottom:1px dotted #e3d6b3}
  .log b{color:var(--ink)}

  .overlay{position:fixed;inset:0;background:rgba(31,42,68,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;padding:16px;z-index:60}
  .overlay.open{display:flex}
  .modal{width:min(440px,94vw);background:#fbf5e6;border-radius:12px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.45);border:1px solid #d9caa3;animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-band{padding:12px 16px;color:#fff;display:flex;align-items:center;justify-content:space-between}
  .modal-band .mt{font-family:"Playfair Display",serif;font-weight:800;font-size:17px;text-transform:uppercase}
  .modal-band .tag{font-family:"Space Mono",monospace;font-size:11px;background:rgba(255,255,255,.22);padding:2px 8px;border-radius:999px}
  .modal-body{padding:16px 18px 18px}
  .stake{font-size:12.5px;color:#6f6238;margin:0 0 12px}
  .q-sent{font-size:17px;font-weight:600;line-height:1.4;margin:0 0 14px;color:var(--ink)}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{text-align:left;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:11px 13px;cursor:pointer;font-size:14px;font-family:inherit;color:var(--ink);transition:all .1s}
  .opt:hover{border-color:var(--ink)}
  .opt .lt{font-family:"Space Mono",monospace;font-weight:700;color:var(--red);margin-right:8px}
  .opt.correct{background:#dff0df;border-color:#3f9d5f}
  .opt.wrong{background:#f6dede;border-color:#cc3b35}
  .opt:disabled{cursor:default}
  .result{margin-top:14px;font-size:14px;font-weight:600;text-align:center;padding:10px;border-radius:8px}
  .result.good{background:#dff0df;color:#22612f}.result.bad{background:#f6dede;color:#8f2a23}
  .mbtns{display:flex;gap:10px;margin-top:14px}
  .mbtn{flex:1;border:0;border-radius:8px;padding:11px;font-family:"Space Mono",monospace;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:12px;cursor:pointer;color:#fff;background:var(--ink)}
  .mbtn:hover{background:var(--red)}
  .mbtn.ghost{background:#e6dcc2;color:var(--ink)}.mbtn.ghost:hover{background:#d8cca8}
  .info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .info-row .k{color:#6f6238;text-transform:uppercase;font-size:10px;letter-spacing:.06em}
  .info-row .v{font-family:"Space Mono",monospace;font-weight:700}

  .screen{position:fixed;inset:0;background:linear-gradient(160deg,#1f2a44,#34406b);z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;overflow:auto}
  .card2{width:min(470px,95vw);background:#fbf5e6;border-radius:14px;padding:22px;box-shadow:0 30px 70px rgba(0,0,0,.5)}
  .card2 .glob{text-align:center;font-size:40px;margin-bottom:2px}
  .card2 h2{font-family:"Playfair Display",serif;font-weight:800;font-size:25px;margin:0 0 2px;text-align:center}
  .card2 p.sub{text-align:center;color:#6f6238;font-size:13px;margin:0 0 18px}
  .bigbtns{display:flex;flex-direction:column;gap:10px}
  .bigbtn{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:14px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);text-align:left;display:flex;gap:10px;align-items:center}
  .bigbtn:hover{border-color:var(--ink);background:#fffdf6}
  .bigbtn .em{font-size:22px}
  .bigbtn small{display:block;font-weight:400;font-size:11.5px;color:#7a6a44}
  .field{margin-bottom:15px}
  .field label{display:block;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:7px}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:52px;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:9px 6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink)}
  .seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .prow{display:flex;align-items:center;gap:9px;margin-bottom:8px}
  .prow .pdisc{width:28px;height:28px}
  .prow input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:9px 11px;font-family:inherit;font-size:14px;background:#fff;min-width:0}
  .prow .tgl{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:9px 10px;cursor:pointer;font-size:12px;font-weight:700;font-family:"Space Mono",monospace;white-space:nowrap}
  .prow .tgl.ai{background:var(--ink);color:#fff;border-color:var(--ink)}
  .go-btn{width:100%;margin-top:8px;border:0;border-radius:10px;padding:14px;background:var(--red);color:#fff;font-family:"Space Mono",monospace;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:14px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.2)}
  .go-btn:hover{filter:brightness(1.05)}
  .go-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
  .link{display:block;text-align:center;margin-top:12px;color:#6f6238;font-size:12px;cursor:pointer;text-decoration:underline}
  .codebox{font-family:"Space Mono",monospace;font-weight:700;font-size:26px;letter-spacing:.12em;text-align:center;background:var(--ink);color:#fff;border-radius:10px;padding:14px;margin:6px 0 4px;user-select:all}
  .lobby-list{list-style:none;padding:0;margin:8px 0}
  .lobby-list li{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .codeinput{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:12px;font-family:"Space Mono",monospace;font-size:18px;text-align:center;letter-spacing:.1em;text-transform:uppercase;background:#fff}
  .note{font-size:11px;color:#8a7c54;margin-top:12px;line-height:1.5;text-align:center}
  .err{color:var(--red);font-size:12.5px;text-align:center;margin-top:8px;min-height:14px}
  .host-skip{display:none;position:fixed;right:14px;bottom:14px;z-index:70;background:var(--red);color:#fff;border:0;border-radius:10px;padding:11px 16px;font-family:"Space Mono",monospace;font-weight:700;font-size:12px;letter-spacing:.04em;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.38)}
  .host-skip:hover{filter:brightness(1.07)}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">World Tourist</h1>
  <div class="roomline" id="roomline"></div>
  <div class="board" id="board"></div>
  <div id="qbanner"></div>
  <div class="hud">
    <div class="panel"><h3>Players</h3><div id="players"></div></div>
    <div class="panel"><h3>Game log</h3><div class="log" id="log"></div></div>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<!-- SCREENS -->
<div class="screen" id="screen"></div>
<button id="hostSkip" class="host-skip">⏭ Skip → CPU</button>

/* ============ HOST ENGINE ============ */
let G=null, ROLE='host', isOnline=false;
let peer=null, conns=[], myConn=null, mySeat=null, roomId=null;
let inputResolver=null,inputKind=null,inputSeat=null,inputPayload=null;

function buildPool(level){let arr=[];if(level==='Mixed'){Object.values(QUESTIONS).forEach(a=>arr=arr.concat(a));}else arr=QUESTIONS[level].slice();for(let i=arr.length-1;i>0;i--){const j=rnd(i+1);[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function drawQ(){if(!G.pool.length)G.pool=buildPool(G.level);return G.pool.pop();}
function pushLog(html){G.log.unshift(html);if(G.log.length>40)G.log.pop();}
function buildView(){return{players:G.players.map(p=>({name:p.name,color:p.color,pos:p.pos,money:p.money,alive:p.alive,skip:p.skip,type:p.type})),owners:G.owners.slice(),cur:G.cur,dice:G.dice,log:G.log.slice(0,12),activeQ:G.activeQ,activeCard:G.activeCard,over:G.over};}
function pushState(){const v=buildView();renderView(v);if(isOnline)broadcast({t:'view',view:v});}
function send(c,o){try{if(c&&c.open)c.send(o);}catch(e){}}
function broadcast(o){conns.forEach(c=>send(c,o));}

function rentFor(i){const cell=CELLS[i],owner=G.owners[i];
  if(cell.t==='prop'){let base=Math.round(cell.price*0.25/10)*10;if(groupMembers[cell.group].every(idx=>G.owners[idx]===owner))base*=2;return base;}
  if(cell.t==='air'){const n=G.owners.filter((o,idx)=>o===owner&&CELLS[idx].t==='air').length;return 2000*n;}
  if(cell.t==='serv'){const n=G.owners.filter((o,idx)=>o===owner&&CELLS[idx].t==='serv').length;return 3000*n;}
  return 0;}
function applyPay(from,amount,toIdx){const pl=G.players[from];
  if(pl.money>=amount){pl.money-=amount;if(toIdx!=null)G.players[toIdx].money+=amount;return true;}
  const give=pl.money;pl.money=0;if(toIdx!=null)G.players[toIdx].money+=give;pl.alive=false;
  G.owners=G.owners.map(o=>o===from?null:o);pushLog(`<b>${pl.name}</b> went bankrupt and is out!`);return false;}

/* request input from a seat: resolves with value */
function requestInput(kind,seat,payload){
  return new Promise(resolve=>{
    const pl=G.players[seat];
    if(pl.type==='ai'){hideHostSkip();setTimeout(()=>resolve(aiDecide(kind,seat,payload)),750);return;}
    inputResolver=resolve;inputKind=kind;inputSeat=seat;inputPayload=payload;
    if(pl.type==='remote'){send(pl.conn,{t:'req',kind,seat,payload});setAction(`<span class="waiting">Waiting for ${escapeHtml(pl.name)}…</span>`);showHostSkip(pl.name);}
    else{hideHostSkip();showInputUI(kind,payload,val=>{inputResolver=null;resolve(val);});}
  });
}
function onRemoteResponse(seat,kind,value){if(inputResolver&&inputKind===kind&&inputSeat===seat){const r=inputResolver;inputResolver=null;hideHostSkip();r(value);}}
/* host: hand a stuck/disconnected remote seat to the CPU (also unsticks the current turn) */
function takeoverWithCPU(seat,reason){
  const pl=G&&G.players[seat];if(!pl)return;
  pl.type='ai';pushLog(`<b>${escapeHtml(pl.name)}</b> ${reason}`);if(G&&!G.over)pushState();
  if(inputSeat===seat&&inputResolver){const val=aiDecide(inputKind,seat,inputPayload);const r=inputResolver;inputResolver=null;hideHostSkip();r(val);}
}
function hostForceCPU(){if(ROLE!=='host'||inputSeat==null||!inputResolver)return;takeoverWithCPU(inputSeat,'was handed to the computer by the host.');}
function showHostSkip(name){const b=document.getElementById('hostSkip');if(!b||ROLE!=='host'||!isOnline)return;b.textContent='⏭ Skip '+name+' → CPU';b.style.display='block';}
function hideHostSkip(){const b=document.getElementById('hostSkip');if(b)b.style.display='none';}

function aiDecide(kind,seat,payload){
  if(kind==='roll')return true;
  if(kind==='card')return true;
  if(kind==='answer'){const correct=Math.random()<G.aiAcc;const q=payload.q;if(correct)return q.a;let w=rnd(4);if(w===q.a)w=(w+1)%4;return w;}
  if(kind==='buy'){const pl=G.players[seat];return pl.money-payload.price>=1000;}
  return null;
}

/* local human input UI */
function showInputUI(kind,payload,cb){
  if(kind==='roll'){setAction(`<button class="roll-btn" id="rb">Roll dice ✈</button>`);document.getElementById('rb').onclick=()=>{setAction('');cb(true);};return;}
  if(kind==='answer'){showQuestion(payload,cb);return;}
  if(kind==='buy'){showBuy(payload,cb);return;}
  if(kind==='card'){showCard(payload,cb);return;}
}
function applyCard(seat,card){
  const pl=G.players[seat];
  if(card.type==='gain'||card.type==='start'){pl.money+=card.amount;pushLog(`<b>${escapeHtml(pl.name)}</b>: ${escapeHtml(card.text)}`);}
  else if(card.type==='lose'){applyPay(seat,card.amount,null);pushLog(`<b>${escapeHtml(pl.name)}</b>: ${escapeHtml(card.text)}`);}
  else if(card.type==='each_gain'){G.players.forEach((o,idx)=>{if(idx!==seat&&o.alive)applyPay(idx,card.amount,seat);});pushLog(`<b>${escapeHtml(pl.name)}</b>: ${escapeHtml(card.text)}`);}
  else if(card.type==='each_lose'){G.players.forEach((o,idx)=>{if(idx!==seat&&o.alive)applyPay(seat,card.amount,idx);});pushLog(`<b>${escapeHtml(pl.name)}</b>: ${escapeHtml(card.text)}`);}
  else if(card.type==='skip'){pl.skip=(pl.skip||0)+1;pushLog(`<b>${escapeHtml(pl.name)}</b>: ${escapeHtml(card.text)}`);}
}

/* turn loop */
async function runTurn(){
  if(G.over)return;
  const seat=G.cur,pl=G.players[seat];
  if(!pl.alive){advance();return runTurn();}
  if(pl.skip>0){pl.skip--;pushLog(`<b>${pl.name}</b> is deported and loses a turn.`);pushState();await wait(900);advance();return runTurn();}
  pushState();
  if(pl.type==='ai')setAction(`<span class="waiting">${escapeHtml(pl.name)} (CPU) is playing…</span>`);
  else if(pl.type==='remote')setAction(`<span class="waiting">Waiting for ${escapeHtml(pl.name)}…</span>`);
  await requestInput('roll',seat,null);
  const d1=1+rnd(6),d2=1+rnd(6),total=d1+d2;G.dice=[d1,d2];
  const e1=document.getElementById('d1'),e2=document.getElementById('d2');
  if(e1){e1.classList.add('rolling');e2.classList.add('rolling');}
  await wait(120);if(e1){e1.classList.remove('rolling');e2.classList.remove('rolling');}
  pushState();await wait(250);
  // answer a question to advance
  const q=drawQ();G.activeQ={lvl:q.lvl,sec:q.sec,q:q.q,who:pl.name};pushState();
  const choice=await requestInput('answer',seat,{q,mode:'advance',total});const ok=choice===q.a;G.activeQ=null;
  if(!ok){pushLog(`<b>${pl.name}</b> answered wrong and stays put.`);pushState();await wait(600);advance();if(G.over)finish();else runTurn();return;}
  pushLog(`<b>${pl.name}</b> answered correctly and flies ${total}.`);pushState();await wait(200);
  await animateMove(seat,total);
  await wait(200);
  await handleLanding(seat);
  advance();
  if(G.over)finish();else runTurn();
}
function advance(){const alive=G.players.filter(p=>p.alive);if(alive.length<=1){G.over=true;return;}do{G.cur=(G.cur+1)%G.players.length;}while(!G.players[G.cur].alive);}
function animateMove(seat,steps){return new Promise(res=>{let left=steps;const iv=setInterval(()=>{const pl=G.players[seat];pl.pos=(pl.pos+1)%40;if(pl.pos===0){pl.money+=2000;pushLog(`<b>${pl.name}</b> passed Start (+$2,000).`);}left--;pushState();if(left<=0){clearInterval(iv);res();}},140);});}

async function handleLanding(seat){
  const pl=G.players[seat],i=pl.pos,cell=CELLS[i];
  if(cell.t==='special'){
    if(cell.key==='goto'){pl.pos=10;pl.skip=1;pushLog(`<b>${pl.name}</b> is sent to Deported — loses next turn.`);pushState();await wait(900);return;}
    if(cell.key==='deported'){pl.skip=(pl.skip||0)+1;pushLog(`<b>${pl.name}</b> got deported — loses next turn.`);pushState();await wait(700);return;}
    if(cell.key==='oceania'){pl.money+=1500;pushLog(`<b>${pl.name}</b> relaxes in Oceania — bonus +$1,500.`);pushState();await wait(600);return;}
    pushLog(`<b>${pl.name}</b> rests at ${SPECIALS[cell.key].title}.`);pushState();await wait(450);return;
  }
  if(cell.t==='tax'){applyPay(seat,cell.amount,null);pushLog(`<b>${pl.name}</b> paid ${cell.name} ${money(cell.amount)}.`);pushState();await wait(650);return;}
  if(cell.t==='card'){
    const deck=cell.kind==='email'?EMAIL_CARDS:SMS_CARDS;const card=deck[rnd(deck.length)];
    const channel=cell.kind==='email'?'E-mail':'SMS';
    G.activeCard={channel,text:card.text,who:pl.name};pushState();
    await requestInput('card',seat,{channel,text:card.text});
    G.activeCard=null;applyCard(seat,card);pushState();await wait(450);return;}
  const owner=G.owners[i];
  if(owner==null){
    if(pl.money>=cell.price){const buy=await requestInput('buy',seat,{i,price:cell.price});
      if(buy){pl.money-=cell.price;G.owners[i]=seat;pushLog(`<b>${pl.name}</b> bought ${cell.name} for ${money(cell.price)}.`);}
      else pushLog(`<b>${pl.name}</b> did not buy ${cell.name}.`);}
    else pushLog(`<b>${pl.name}</b> can't afford ${cell.name}.`);
    pushState();return;}
  if(owner===seat){pushLog(`<b>${pl.name}</b> rests on their own ${cell.name}.`);pushState();await wait(450);return;}
  const rent=rentFor(i);applyPay(seat,rent,owner);pushLog(`<b>${pl.name}</b> paid rent ${money(rent)} to <b>${G.players[owner].name}</b>.`);pushState();await wait(500);
}
function finish(){const w=G.players.find(p=>p.alive)||G.players.slice().sort((a,b)=>b.money-a.money)[0];
  pushState();if(isOnline)broadcast({t:'over',winnerName:w.name,winnerColor:w.color});showWinner(w.name,w.color);}
function showWinner(name,color){const m=document.getElementById('modal');m.innerHTML=`<div class="modal-band" style="background:${color}"><span class="mt">🏆 ${escapeHtml(name)} wins!</span></div><div class="modal-body"><p class="q-sent" style="text-align:center">${escapeHtml(name)} is the World Tourist champion!</p><button class="mbtn" style="width:100%" onclick="location.reload()">Play again</button></div>`;openModal();}

/* start engine (host or local) */
function startEngine(seatsCfg,level,aiDiff){
  G={level,aiAcc:AIDIFF[aiDiff]||.72,pool:buildPool(level),owners:Array(40).fill(null),players:[],cur:0,dice:[0,0],log:[],activeQ:null,activeCard:null,over:false};
  seatsCfg.forEach((s,idx)=>{G.players.push({name:s.name||('Player '+(idx+1)),color:PCOLORS[idx],pos:0,money:10000,alive:true,skip:0,type:s.type,conn:s.conn||null});});
  hideScreen();pushLog(`Game start · ${G.players.length} players · ${level} questions.`);pushState();
  if(isOnline)broadcast({t:'start'});
  runTurn();
}

/* ============ CLIENT SIDE ============ */
let clientBusy=false;
function clientRender(v){renderView(v);
  if(v.over)return;
  if(clientBusy)return; // a req modal is up
  if(v.cur===mySeat)setAction(`<span class="waiting">Your turn — get ready…</span>`);
  else setAction(`<span class="waiting">Waiting for ${escapeHtml(v.players[v.cur]?v.players[v.cur].name:'…')}…</span>`);
}
function clientHandleReq(kind,payload){
  clientBusy=true;
  if(kind==='roll'){setAction(`<button class="roll-btn" id="rb">Roll dice ✈</button>`);document.getElementById('rb').onclick=()=>{setAction('<span class="waiting">Rolling…</span>');clientBusy=false;send(myConn,{t:'res',kind:'roll',value:true});};return;}
  if(kind==='answer'){showQuestionClient(payload,choice=>{clientBusy=false;send(myConn,{t:'res',kind:'answer',value:choice});});return;}
  if(kind==='buy'){showBuyClient(payload,val=>{clientBusy=false;send(myConn,{t:'res',kind:'buy',value:val});});return;}
  if(kind==='card'){showCardClient(payload,()=>{clientBusy=false;send(myConn,{t:'res',kind:'card',value:true});});return;}
}
function showCardClient(payload,cb){const m=document.getElementById('modal');m.innerHTML=cardModalHtml(payload);openModal();document.getElementById('cardok').onclick=()=>{closeModal();cb(true);};}
function showQuestionClient(payload,cb){
  const {q,total}=payload;
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="modal-band" style="background:var(--ink)"><span class="mt">Take off ✈</span><span class="tag">${q.lvl} · ${q.sec}</span></div>
    <div class="modal-body"><p class="stake">Answer correctly to fly <b>${total}</b> ${total===1?'space':'spaces'}. A wrong answer keeps you grounded.</p><p class="q-sent">${escapeHtml(q.q)}</p><div class="opts" id="opts"></div><div id="qfoot"></div></div>`;
  const opts=document.getElementById('opts');
  q.o.forEach((opt,idx)=>{const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="lt">${'ABCD'[idx]})</span>${escapeHtml(opt)}`;
    b.onclick=()=>{[...opts.children].forEach((x,j)=>{x.disabled=true;if(j===q.a)x.classList.add('correct');else if(j===idx)x.classList.add('wrong');});
      const ok=idx===q.a;document.getElementById('qfoot').innerHTML=`<div class="result ${ok?'good':'bad'}">${ok?'✔ Correct — cleared for takeoff!':'✘ Incorrect — grounded this turn.'}</div><button class="mbtn" style="width:100%;margin-top:12px" id="cont">Continue</button>`;
      document.getElementById('cont').onclick=()=>{closeModal();cb(idx);};};
    opts.appendChild(b);});
  openModal();
}
function showBuyClient(payload,cb){const {i,price}=payload;const cell=CELLS[i];
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="modal-band" style="background:${cell.t==='prop'?COLORS[cell.group]:'var(--g-serv)'}"><span class="mt">${cell.name}</span></div>
    <div class="modal-body"><p class="q-sent" style="font-size:15px;font-weight:500">Buy <b>${cell.name}</b> for ${money(price)}?</p>
    <div class="mbtns"><button class="mbtn" id="by">Buy</button><button class="mbtn ghost" id="bn">Skip</button></div></div>`;
  openModal();document.getElementById('bn').onclick=()=>{closeModal();cb(false);};document.getElementById('by').onclick=()=>{closeModal();cb(true);};
}

/* ============ INFO / MODAL HELPERS ============ */
const overlay=document.getElementById('overlay');
function openModal(){overlay.classList.add('open');}
window.closeModal=function(){overlay.classList.remove('open');};
function showCellInfo(i){if(!lastView)return;const cell=CELLS[i];if(!(cell.t==='prop'||cell.t==='air'||cell.t==='serv'))return;
  const owner=lastView.owners[i];const oc=cell.t==='prop'?COLORS[cell.group]:'var(--g-serv)';
  let rows=`<div class="info-row"><span class="k">Price</span><span class="v">${money(cell.price)}</span></div><div class="info-row"><span class="k">Owner</span><span class="v">${owner==null?'— (open)':escapeHtml(lastView.players[owner].name)}</span></div>`;
  if(cell.t==='prop')rows+=`<div class="info-row"><span class="k">Rent</span><span class="v">${money(Math.round(cell.price*0.25/10)*10)} (×2 set)</span></div>`;
  if(cell.t==='air')rows+=`<div class="info-row"><span class="k">Rent</span><span class="v">$2,000 × airlines</span></div>`;
  if(cell.t==='serv')rows+=`<div class="info-row"><span class="k">Rent</span><span class="v">$3,000 × utilities</span></div>`;
  const m=document.getElementById('modal');m.innerHTML=`<div class="modal-band" style="background:${oc}"><span class="mt">${cell.name}</span></div><div class="modal-body">${rows}<button class="mbtn" style="width:100%;margin-top:14px" onclick="closeModal()">Close</button></div>`;openModal();}

/* ============ SCREENS / MENUS ============ */
const screen=document.getElementById('screen');
function hideScreen(){screen.style.display='none';}
function showScreen(html){screen.style.display='flex';screen.innerHTML=`<div class="card2">${html}</div>`;}

function menuMain(){
  showScreen(`<div class="glob">🌍✈️</div><h2>World Tourist</h2><p class="sub">Fly around the world and answer English questions to claim countries.</p>
    <div class="bigbtns">
      <button class="bigbtn" id="mLocal"><span class="em">🎮</span><span>Same device<small>Pass &amp; play, or play vs the computer (AI)</small></span></button>
      <button class="bigbtn" id="mHost"><span class="em">📡</span><span>Host online game<small>Create a room — friends join from their devices</small></span></button>
      <button class="bigbtn" id="mJoin"><span class="em">🔗</span><span>Join online game<small>Enter a room code from the host</small></span></button>
    </div>`);
  document.getElementById('mLocal').onclick=menuLocal;
  document.getElementById('mHost').onclick=menuHost;
  document.getElementById('mJoin').onclick=menuJoin;
}
let cfgCount=2,cfgLevel='A1-A2',cfgDiff='Medium',cfgTypes=['human','ai','ai','ai','ai','ai'];
function levelSeg(id){return `<div class="seg" id="${id}">`+['A1-A2','B1-B2','C1-C2','Mixed'].map(l=>`<button data-v="${l}" class="${l===cfgLevel?'on':''}">${l}</button>`).join('')+`</div>`;}
function diffSeg(id){return `<div class="seg" id="${id}">`+['Easy','Medium','Hard'].map(l=>`<button data-v="${l}" class="${l===cfgDiff?'on':''}">${l}</button>`).join('')+`</div>`;}
function countSeg(id){return `<div class="seg" id="${id}">`+[2,3,4,5,6].map(n=>`<button data-v="${n}" class="${n===cfgCount?'on':''}">${n}</button>`).join('')+`</div>`;}
function wireSeg(id,cb){const s=document.getElementById(id);s.querySelectorAll('button').forEach(b=>b.onclick=()=>{s.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cb(b.dataset.v);});}

function menuLocal(){
  showScreen(`<h2>Same device</h2><p class="sub">Set each seat to Human or Computer.</p>
    <div class="field"><label>Players</label>${countSeg('sc')}</div>
    <div class="field"><label>Seats</label><div id="seats"></div></div>
    <div class="field"><label>English level</label>${levelSeg('sl')}</div>
    <div class="field"><label>Computer difficulty</label>${diffSeg('sd')}</div>
    <button class="go-btn" id="go">Start game ✈</button>
    <span class="link" id="back">← Back</span>`);
  function drawSeats(){const box=document.getElementById('seats');box.innerHTML='';for(let i=0;i<cfgCount;i++){const row=document.createElement('div');row.className='prow';
    row.innerHTML=`<span class="pdisc" style="background:${PCOLORS[i]}">✈</span><input type="text" maxlength="14" value="${cfgTypes[i]==='ai'?('Computer '+(i+1)):('Player '+(i+1))}"><button class="tgl ${cfgTypes[i]==='ai'?'ai':''}" data-i="${i}">${cfgTypes[i]==='ai'?'CPU':'Human'}</button>`;box.appendChild(row);}
    box.querySelectorAll('.tgl').forEach(t=>t.onclick=()=>{const i=+t.dataset.i;cfgTypes[i]=cfgTypes[i]==='ai'?'human':'ai';const inp=t.parentElement.querySelector('input');inp.value=cfgTypes[i]==='ai'?('Computer '+(i+1)):('Player '+(i+1));drawSeats();});}
  drawSeats();
  wireSeg('sc',v=>{cfgCount=+v;if(cfgCount>=1)cfgTypes[0]='human';drawSeats();});
  wireSeg('sl',v=>cfgLevel=v);wireSeg('sd',v=>cfgDiff=v);
  document.getElementById('back').onclick=menuMain;
  document.getElementById('go').onclick=()=>{const inputs=[...document.querySelectorAll('#seats input')];
    const seats=[];for(let i=0;i<cfgCount;i++)seats.push({name:inputs[i].value.trim(),type:cfgTypes[i]});
    isOnline=false;ROLE='host';startEngine(seats,cfgLevel,cfgDiff);};
}

/* ---- HOST ONLINE ---- */
let hostSeats=[]; // {name,type:'human'|'ai'|'remote',conn,filled}
function menuHost(){
  if(typeof Peer==='undefined'){showScreen(`<h2>Online unavailable</h2><p class="sub">The networking library didn't load. Check your connection, or use “Same device”.</p><span class="link" id="back">← Back</span>`);document.getElementById('back').onclick=menuMain;return;}
  showScreen(`<h2>Host online</h2><p class="sub">Pick total players, how many are computers, and the level.</p>
    <div class="field"><label>Total players</label>${countSeg('sc')}</div>
    <div class="field"><label>Computers (AI)</label><div class="seg" id="sa"></div></div>
    <div class="field"><label>English level</label>${levelSeg('sl')}</div>
    <div class="field"><label>Computer difficulty</label>${diffSeg('sd')}</div>
    <input type="text" id="hostName" class="codeinput" style="font-size:15px;text-transform:none;letter-spacing:0" maxlength="14" value="Host" placeholder="Your name">
    <button class="go-btn" id="go" style="margin-top:14px">Create room →</button>
    <span class="link" id="back">← Back</span>`);
  let aiCount=1;
  function drawAI(){const sa=document.getElementById('sa');const maxAI=cfgCount-1;sa.innerHTML='';for(let n=0;n<=maxAI;n++){const b=document.createElement('button');b.textContent=n;if(n===aiCount)b.classList.add('on');b.onclick=()=>{aiCount=n;drawAI();};sa.appendChild(b);}}
  drawAI();
  wireSeg('sc',v=>{cfgCount=+v;if(aiCount>cfgCount-1)aiCount=cfgCount-1;drawAI();});
  wireSeg('sl',v=>cfgLevel=v);wireSeg('sd',v=>cfgDiff=v);
  document.getElementById('back').onclick=menuMain;
  document.getElementById('go').onclick=()=>{const hn=document.getElementById('hostName').value.trim()||'Host';createRoom(hn,aiCount);};
}
const ROOM_PREFIX='wtour-';
let displayCode='';
function genCode(){return ''+Math.floor(10000+Math.random()*90000);}
function createRoom(hostName,aiCount){
  displayCode=genCode();roomId=ROOM_PREFIX+displayCode;
  isOnline=true;ROLE='host';
  // seats: 0 = host(human local); then humans=remote until count; remaining = ai
  const total=cfgCount,humanRemote=total-aiCount-1;
  hostSeats=[{name:hostName,type:'human',conn:null,filled:true}];
  for(let i=0;i<humanRemote;i++)hostSeats.push({name:'Waiting…',type:'remote',conn:null,filled:false});
  for(let i=0;i<aiCount;i++)hostSeats.push({name:'Computer',type:'ai',conn:null,filled:true});
  conns=[];
  peer=new Peer(roomId,{debug:1});
  peer.on('open',()=>lobbyHost());
  peer.on('error',e=>{if((''+e).includes('unavailable')){displayCode=genCode();roomId=ROOM_PREFIX+displayCode;peer=new Peer(roomId);peer.on('open',()=>lobbyHost());peer.on('connection',hostOnConn);}else{document.getElementById('herr')&&(document.getElementById('herr').textContent='Network error: '+e);}});
  peer.on('connection',hostOnConn);
}
function hostOnConn(conn){
  conn.on('data',d=>{
    if(d.t==='hello'){const seat=hostSeats.findIndex(s=>s.type==='remote'&&!s.filled);
      if(seat<0){send(conn,{t:'full'});return;}
      hostSeats[seat].filled=true;hostSeats[seat].name=d.name||('Player '+(seat+1));hostSeats[seat].conn=conn;conn._seat=seat;conns[seat]=conn;
      send(conn,{t:'seat',seat});broadcastLobby();lobbyHost();}
    else if(d.t==='res'){onRemoteResponse(conn._seat,d.kind,d.value);}
  });
  conn.on('close',()=>{const s=conn._seat;if(s!=null&&hostSeats[s]){hostSeats[s].filled=false;if(G&&!G.over)takeoverWithCPU(s,'disconnected — now played by the computer.');}});
}
function broadcastLobby(){const info=hostSeats.map(s=>({name:s.name,type:s.type,filled:s.filled}));conns.forEach(c=>send(c,{t:'lobby',seats:info,level:cfgLevel}));}
function lobbyHost(){
  const filledRemote=hostSeats.filter(s=>s.type==='remote'&&s.filled).length;
  const needRemote=hostSeats.filter(s=>s.type==='remote').length;
  showScreen(`<h2>Room ready</h2><p class="sub">Share this code. Players open the same page → “Join online game”.</p>
    <div class="codebox">${displayCode}</div>
    <p class="sub" style="margin:8px 0">${cfgLevel} questions · ${cfgDiff} CPU</p>
    <ul class="lobby-list">${hostSeats.map((s,i)=>`<li><span class="pdisc" style="background:${PCOLORS[i]}">✈</span> ${escapeHtml(s.name)} <span class="tagk" style="margin-left:auto;font-family:Space Mono,monospace;font-size:10px;color:#7a6a44">${s.type==='ai'?'CPU':(s.type==='remote'?(s.filled?'online ✓':'waiting…'):'host')}</span></li>`).join('')}</ul>
    <button class="go-btn" id="go">Start game ✈ ${needRemote>0?`(${filledRemote}/${needRemote} joined)`:''}</button>
    <p class="note">You can start anytime — empty online seats become computers. Online play must run on your published page (GitHub Pages/Netlify); the in-editor preview may block connections.</p>
    <span class="link" id="back">← Cancel</span><div class="err" id="herr"></div>`);
  document.getElementById('go').onclick=()=>{hostSeats.forEach((s,i)=>{if(s.type==='remote'&&!s.filled){s.type='ai';s.name='Computer '+(i+1);}});
    const seats=hostSeats.map(s=>({name:s.name,type:s.type==='remote'?'remote':s.type,conn:s.conn}));startEngine(seats,cfgLevel,cfgDiff);};
  document.getElementById('back').onclick=()=>{try{peer&&peer.destroy();}catch(e){}menuMain();};
}

/* ---- JOIN ONLINE ---- */
function menuJoin(){
  if(typeof Peer==='undefined'){showScreen(`<h2>Online unavailable</h2><p class="sub">The networking library didn't load. Check your connection.</p><span class="link" id="back">← Back</span>`);document.getElementById('back').onclick=menuMain;return;}
  showScreen(`<h2>Join online</h2><p class="sub">Enter the room code from the host and your name.</p>
    <div class="field"><label>Room code</label><input type="text" id="code" class="codeinput" inputmode="numeric" placeholder="12345" maxlength="5"></div>
    <div class="field"><label>Your name</label><input type="text" id="jname" class="codeinput" style="font-size:15px;text-transform:none;letter-spacing:0" maxlength="14" placeholder="Your name"></div>
    <button class="go-btn" id="go">Join →</button>
    <span class="link" id="back">← Back</span><div class="err" id="jerr"></div>`);
  document.getElementById('back').onclick=menuMain;
  document.getElementById('go').onclick=()=>{const code=document.getElementById('code').value.replace(/\D/g,'').slice(0,5);const nm=document.getElementById('jname').value.trim()||'Player';
    if(code.length!==5){document.getElementById('jerr').textContent='Enter the 5-digit code.';return;}joinRoom(code,nm);};
}
function joinRoom(code,name){
  ROLE='client';isOnline=true;
  showScreen(`<h2>Connecting…</h2><p class="sub">Joining room ${escapeHtml(code)}…</p><div class="err" id="jerr"></div><span class="link" id="back">← Cancel</span>`);
  document.getElementById('back').onclick=()=>location.reload();
  peer=new Peer({debug:1});
  peer.on('open',()=>{myConn=peer.connect(ROOM_PREFIX+code,{reliable:true});
    myConn.on('open',()=>{myConn.send({t:'hello',name});});
    myConn.on('data',onHostData);
    myConn.on('close',()=>{const e=document.getElementById('jerr');if(e)e.textContent='Connection closed.';});
    setTimeout(()=>{if(!myConn||!myConn.open){const e=document.getElementById('jerr');if(e)e.textContent='Could not reach the room. Check the code, or that the host is on the published page.';}},6000);
  });
  peer.on('error',e=>{const el=document.getElementById('jerr');if(el)el.textContent='Error: '+e;});
}
function onHostData(d){
  if(d.t==='seat'){mySeat=d.seat;}
  else if(d.t==='full'){showScreen(`<h2>Room full</h2><p class="sub">All online seats are taken.</p><span class="link" onclick="location.reload()">← Back</span>`);}
  else if(d.t==='lobby'){lobbyClient(d);}
  else if(d.t==='start'){hideScreen();}
  else if(d.t==='view'){if(screen.style.display!=='none')hideScreen();clientRender(d.view);}
  else if(d.t==='req'){if(d.seat===mySeat)clientHandleReq(d.kind,d.payload);}
  else if(d.t==='over'){showWinner(d.winnerName,d.winnerColor);}
}
function lobbyClient(d){
  showScreen(`<h2>You're in!</h2><p class="sub">${d.level} questions · waiting for the host to start.</p>
    <ul class="lobby-list">${d.seats.map((s,i)=>`<li><span class="pdisc" style="background:${PCOLORS[i]}">✈</span> ${escapeHtml(s.name)}${i===mySeat?' <b>(you)</b>':''} <span style="margin-left:auto;font-family:Space Mono,monospace;font-size:10px;color:#7a6a44">${s.type==='ai'?'CPU':(s.type==='remote'?(s.filled?'online':'waiting'):'host')}</span></li>`).join('')}</ul>
    <p class="note">Hang tight — the game starts when the host presses Start.</p>`);
}

/* boot */
buildBoard();
const _hs=document.getElementById('hostSkip');if(_hs)_hs.onclick=hostForceCPU;
document.getElementById('roomline').textContent='';
menuMain();
</script>
